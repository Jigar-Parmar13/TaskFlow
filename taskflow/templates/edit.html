{% extends 'base.html' %}

{% block title %}Edit Task - TaskFlow{% endblock %}

{% block content %}
<div class="form-card">
    <div class="form-card-header">
        <h2>Edit Task</h2>
    </div>
    <div class="form-card-body">
        <form action="{{ url_for('main.edit_task', task_id=task.id) }}" method="POST" class="task-form">
            <!-- Title -->
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="title">Task Title <span style="color: var(--priority-high);">*</span></label>
                <input type="text" name="title" id="title" class="form-input" placeholder="What needs to be done?" value="{{ task.title }}" required maxlength="100">
            </div>

            <!-- Description -->
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="description">Description</label>
                <textarea name="description" id="description" class="form-input" placeholder="Add more details about this task...">{{ task.description or '' }}</textarea>
            </div>

            <!-- Priority & Due Date (Inline row on large screen) -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                <div class="form-group">
                    <label for="priority">Priority</label>
                    <select name="priority" id="priority" class="form-select">
                        <option value="Low" {% if task.priority == 'Low' %}selected{% endif %}>Low</option>
                        <option value="Medium" {% if task.priority == 'Medium' %}selected{% endif %}>Medium</option>
                        <option value="High" {% if task.priority == 'High' %}selected{% endif %}>High</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="due_date">Due Date</label>
                    <input type="date" name="due_date" id="due_date" class="form-input" value="{% if task.due_date %}{{ task.due_date.strftime('%Y-%m-%d') }}{% endif %}">
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="form-action-group">
                <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                    </svg>
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
